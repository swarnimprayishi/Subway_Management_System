<!DOCTYPE html>
<html lang="en">
<head>
   
    
    <title>ServiceHub - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --bg-dark: #0f111a;
            --card-bg: #1a1c26;
            --purple-glow: #6366f1;
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background: var(--card-bg);
            height: 100vh;
            padding: 20px;
            border-right: 1px solid #2d2f3b;
        }

        .sidebar h2 { font-size: 1.2rem; color: var(--purple-glow); margin-bottom: 30px; }
        
        .nav-item {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-gray);
            transition: 0.3s;
            text-decoration: none;
            display: block;
        }

        .nav-item.active {
            background: rgba(99, 102, 241, 0.1);
            color: white;
            border-left: 4px solid var(--purple-glow);
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #2d2f3b;
        }

        .stat-card span { color: var(--text-gray); font-size: 0.9rem; }
        .stat-card h2 { margin: 10px 0 0; font-size: 2rem; }

        /* Booking List Styling */
        .booking-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
        }

        .booking-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #2d2f3b;
        }

        .booking-info strong { display: block; font-size: 1.1rem; }
        .booking-info small { color: var(--text-gray); }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-transform: capitalize;
            margin-left: 10px;
        }

        /* Status Colors to match your request */
        .confirmed { background: rgba(16, 185, 129, 0.2); color: #10b981; } /* Green */
        .new, .pending { background: rgba(239, 68, 68, 0.2); color: #ef4444; } /* Red for Pending */
        .cancelled { background: rgba(59, 130, 246, 0.2); color: #3b82f6; } /* Blue for Cancelled */

        select {
            background: #0f111a;
            color: white;
            border: 1px solid var(--purple-glow);
            padding: 5px;
            border-radius: 5px;
            margin-right: 10px;
            outline: none;
        }
    </style>
    <script>
        // Restrict access to only logged-in Admins
        if (sessionStorage.getItem('isLoggedIn') !== 'true' || sessionStorage.getItem('userRole') !== 'admin') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>

    <aside class="sidebar">
        <h2>🛡️ Admin Panel</h2>
        <div class="nav-item active">Dashboard</div>
        <a href="index.html" class="nav-item">View Site</a>
    </aside>

    <main class="main-content">
        <h1>Dashboard</h1>
        
        <div class="dashboard-grid">
            <div class="stat-card">
                <span>Total Bookings</span>
                <h2 id="totalCount">0</h2>
            </div>
            <div class="stat-card">
                <span>Pending</span>
                <h2 id="pendingCount">0</h2>
            </div>
            <div class="stat-card">
                <span>Confirmed</span>
                <h2 id="confirmedCount">0</h2>
            </div>
            <div class="stat-card">
                <span>Cancelled</span>
                <h2 id="cancelledCount">0</h2>
            </div>
        </div>

        <section class="booking-section">
            <h3>Recent Bookings</h3>
            <div id="adminBookingList">
                </div>
        </section>
    </main>

    <script>
        
        async function loadAdminDashboard() {
            try {
                const res = await fetch('http://localhost:3000/api/orders');
                const orders = await res.json();

                // Calculate Stats
                const total = orders.length;
                const confirmed = orders.filter(o => o.status === 'confirmed').length;
                const pending = orders.filter(o => o.status === 'new' || o.status === 'pending').length;
                const cancelled = orders.filter(o => o.status === 'cancelled').length;

                // Update Stats UI
                document.getElementById('totalCount').innerText = total;
                document.getElementById('confirmedCount').innerText = confirmed;
                document.getElementById('pendingCount').innerText = pending;
                document.getElementById('cancelledCount').innerText = cancelled;

                // Load Booking Rows
                const list = document.getElementById('adminBookingList');
                if (orders.length === 0) {
                    list.innerHTML = "<p style='padding:20px; color:gray;'>No bookings found.</p>";
                    return;
                }

                list.innerHTML = orders.map(order => `
                    <div class="booking-row">
                        <div class="booking-info">
                            <strong>${order.name} <span class="status-badge ${order.status}">${order.status}</span></strong>
                            <small>${order.type} • ${order.item || 'N/A'}</small>
                        </div>
                        <div class="booking-actions">
                            <select onchange="updateStatus('${order.id}', this.value)">
                                <option value="new" ${order.status === 'new' ? 'selected' : ''}>New / Pending</option>
                                <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                            <button onclick="deleteBooking('${order.id}')" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">🗑️</button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Dashboard failed to load", err);
                document.getElementById('adminBookingList').innerHTML = "Failed to load data.";
            }
        }

        // Updated status update function as per your request
        async function updateStatus(id, newStatus) {
            try {
                const response = await fetch(`http://localhost:3000/api/orders/${id}`, {
                    method: 'PATCH', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (response.ok) {
                    console.log(`Order ${id} updated to ${newStatus}`);
                    // This refreshes the Admin dashboard immediately to reflect new card counts
                    loadAdminDashboard(); 
                } else {
                    alert("Failed to update status on server.");
                }
            } catch (err) {
                console.error("Failed to update status", err);
            }
        }

        async function deleteBooking(id) {
            if(confirm("Are you sure you want to delete this record?")) {
                try {
                    const response = await fetch(`http://localhost:3000/api/orders/${id}`, { method: 'DELETE' });
                    if(response.ok) loadAdminDashboard();
                } catch (err) {
                    console.error("Delete failed", err);
                }
            }
        }

        // Initial Load
        loadAdminDashboard();
    </script>
</body>
</html>
